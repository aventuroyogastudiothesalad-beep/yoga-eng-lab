<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Sequencing Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .tooltip-trigger { position: relative; }
        .tooltip-content { display: none; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); width: 200px; background: #1c1917; color: white; padding: 10px; border-radius: 8px; z-index: 50; font-size: 11px; shadow: xl; }
        .tooltip-trigger:hover .tooltip-content { display: block; }
        .block-item:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans p-4 md:p-8">

    <header class="max-w-4xl mx-auto flex justify-between items-start mb-8 no-print">
        <div>
            <h1 class="text-2xl font-light tracking-[0.2em] uppercase italic text-indigo-900">Yoga Sequencing Builder</h1>
            <p class="text-[9px] text-stone-500 uppercase tracking-widest mt-1">Metodo de Elena Vallenilla Applicacion de Mariateresa Linsalata</p>
        </div>
        <div class="flex flex-col items-end gap-2">
            <div class="bg-white px-4 py-1 rounded-full shadow-sm border border-indigo-100">
                <span id="totalTime" class="text-xl font-mono font-bold text-indigo-600">0</span>
                <span class="text-[10px] uppercase text-stone-400 font-bold ml-1">min</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <aside class="lg:col-span-1 space-y-6 no-print">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-4 text-center">Gestione Sessioni</h2>
                <div class="space-y-3">
                    <input id="save-name" type="text" placeholder="Nome lezione (es. Lunedì)" class="w-full text-sm p-2 border rounded-lg focus:ring-1 focus:ring-indigo-400 outline-none">
                    <button onclick="saveToArchive()" class="w-full bg-indigo-600 text-white text-xs py-3 rounded-lg font-bold hover:bg-indigo-700 transition">GUARDAR CLASE</button>
                    <button onclick="resetApp()" class="w-full border border-stone-200 text-stone-400 text-[10px] py-2 rounded-lg font-bold hover:bg-stone-50 transition">RESET / NUOVA</button>
                </div>
                
                <div class="mt-8">
                    <h3 class="text-[9px] font-bold uppercase text-stone-400 mb-3 border-b pb-1">Lezioni Salvate</h3>
                    <ul id="archive-list" class="space-y-2 max-h-60 overflow-y-auto">
                        </ul>
                </div>
            </section>
        </aside>

        <div class="lg:col-span-2 space-y-6">
            <section class="bg-indigo-900 text-white p-6 rounded-2xl shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input id="focus-espiritual" type="text" placeholder="Enfoque Espiritual" class="bg-indigo-800/50 border-none rounded-lg p-2 text-sm placeholder-indigo-400 outline-none">
                    <input id="focus-fisico" type="text" placeholder="Enfoque Físico" class="bg-indigo-800/50 border-none rounded-lg p-2 text-sm placeholder-indigo-400 outline-none">
                </div>
                <textarea id="spiritual-intent" class="w-full bg-indigo-800/50 border-none rounded-lg p-3 text-sm placeholder-indigo-400 h-20 resize-none outline-none mb-3" placeholder="Reflexión de la clase..."></textarea>
                <input id="postura-pico-name" type="text" placeholder="Postura Pico" class="w-full bg-white/10 border-none rounded-lg p-2 text-sm font-bold text-indigo-200">
            </section>

            <div id="builder" class="space-y-3">
                </div>

            <button onclick="addNewBlock()" class="no-print w-full py-4 border-2 border-dashed border-stone-300 rounded-xl text-stone-400 text-xs font-bold hover:bg-stone-200 hover:border-stone-400 transition">
                + AGGIUNGI FASE PERSONALIZZATA
            </button>
            
            <button onclick="window.print()" class="no-print w-full bg-stone-800 text-white py-4 rounded-xl font-bold shadow-lg mt-4">
                STAMPA / GENERA PDF
            </button>
        </div>
    </main>

    <script>
        let currentBlocks = [
            { title: "Introducción", min: 4, tip: "Seguridad y tema", placeholder: "Bienvenida..." },
            { title: "Pranayama", min: 4, tip: "Respiración", placeholder: "Ujjayi..." },
            { title: "Warm up", min: 5, tip: "Lubricación", placeholder: "Gato-vaca..." },
            { title: "Surya A", min: 10, tip: "Calor", placeholder: "Saludos al sol..." },
            { title: "Surya B", min: 10, tip: "Fuerza", placeholder: "Guerreros..." },
            { title: "Peak Pose", min: 12, tip: "Cenit", placeholder: "Progressione..." },
            { title: "Hip Opening", min: 6, tip: "Apertura", placeholder: "Paloma..." },
            { title: "Backbends", min: 6, tip: "Arcos", placeholder: "Ustrasana..." },
            { title: "Cool Down", min: 5, tip: "Enfriamiento", placeholder: "Torsiones..." },
            { title: "Savasana", min: 7, tip: "Integración", placeholder: "Silencio..." }
        ];

        function renderBlocks() {
            const container = document.getElementById('builder');
            container.innerHTML = '';
            currentBlocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = "block-item bg-white p-4 rounded-xl shadow-sm border border-stone-200 relative group";
                div.innerHTML = `
                    <button onclick="removeBlock(${i})" class="no-print delete-btn opacity-0 absolute -left-3 top-4 bg-red-100 text-red-500 rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-red-500 hover:text-white transition">×</button>
                    <div class="flex justify-between items-center mb-2">
                        <div class="tooltip-trigger flex items-center gap-2 cursor-help">
                            <span class="text-[9px] font-bold text-indigo-400">${(i+1).toString().padStart(2,'0')}</span>
                            <input type="text" value="${b.title}" oninput="currentBlocks[${i}].title=this.value" class="text-[10px] font-black uppercase tracking-widest text-indigo-900 border-none p-0 focus:ring-0 w-40">
                            <span class="text-indigo-200 text-xs no-print">ⓘ</span>
                            <div class="tooltip-content">${b.tip || 'Fase personalizada'}</div>
                        </div>
                        <div class="flex items-center gap-1 no-print">
                            <input type="number" value="${b.min}" oninput="updateTime(${i}, this.value)" class="min-input w-8 text-right font-bold text-indigo-600 outline-none">
                            <span class="text-[9px] text-stone-300 font-bold uppercase">min</span>
                        </div>
                    </div>
                    <textarea oninput="updateText(${i}, this.value)" class="w-full h-16 text-sm p-2 bg-stone-50 rounded border-none focus:ring-1 focus:ring-indigo-100 resize-none mb-1 outline-none" placeholder="${b.placeholder || 'Dettagli...'}">${b.text || ''}</textarea>
                    <input type="text" value="${b.counter || ''}" oninput="updateCounter(${i}, this.value)" class="w-full text-[10px] p-2 bg-orange-50/30 border-dashed border border-orange-100 rounded italic placeholder-orange-300 outline-none" placeholder="Contropostura / Compensación...">
                `;
                container.appendChild(div);
            });
            updateTotal();
        }

        function updateTime(i, val) { currentBlocks[i].min = parseInt(val) || 0; updateTotal(); }
        function updateText(i, val) { currentBlocks[i].text = val; }
        function updateCounter(i, val) { currentBlocks[i].counter = val; }
        
        function updateTotal() {
            const total = currentBlocks.reduce((acc, curr) => acc + (parseInt(curr.min) || 0), 0);
            document.getElementById('totalTime').innerText = total;
        }

        function addNewBlock() {
            currentBlocks.push({ title: "NUEVA FASE", min: 5, text: "", counter: "", tip: "Fase personalizzata aggiunta da te" });
            renderBlocks();
        }

        function removeBlock(i) {
            currentBlocks.splice(i, 1);
            renderBlocks();
        }

        function resetApp() {
            if(confirm("Vuoi svuotare tutto e iniziare una nuova lezione?")) {
                localStorage.removeItem('yoga_eleva_current');
                location.reload();
            }
        }

        // --- GESTIONE ARCHIVIO ---
        function saveToArchive() {
            const name = document.getElementById('save-name').value || "Classe senza nome";
            const fullData = {
                name: name,
                espiritual: document.getElementById('focus-espiritual').value,
                fisico: document.getElementById('focus-fisico').value,
                intent: document.getElementById('spiritual-intent').value,
                pico: document.getElementById('postura-pico-name').value,
                blocks: currentBlocks,
                date: new Date().toLocaleDateString()
            };
            let archive = JSON.parse(localStorage.getItem('yoga_archive') || '[]');
            archive.push(fullData);
            localStorage.setItem('yoga_archive', JSON.stringify(archive));
            alert("Lezione salvata in archivio!");
            renderArchive();
        }

        function renderArchive() {
            const list = document.getElementById('archive-list');
            const archive = JSON.parse(localStorage.getItem('yoga_archive') || '[]');
            list.innerHTML = archive.map((item, i) => `
                <li class="flex justify-between items-center bg-stone-50 p-2 rounded border border-stone-100 group">
                    <button onclick="loadFromArchive(${i})" class="text-[11px] font-bold text-stone-600 hover:text-indigo-600 text-left truncate w-40">
                        ${item.name} <span class="block text-[8px] font-normal text-stone-400">${item.date}</span>
                    </button>
                    <button onclick="deleteFromArchive(${i})" class="opacity-0 group-hover:opacity-100 text-red-400 text-xs px-2">×</button>
                </li>
            `).join('');
        }

        function loadFromArchive(i) {
            const archive = JSON.parse(localStorage.getItem('yoga_archive'));
            const data = archive[i];
            document.getElementById('focus-espiritual').value = data.espiritual;
            document.getElementById('focus-fisico').value = data.fisico;
            document.getElementById('spiritual-intent').value = data.intent;
            document.getElementById('postura-pico-name').value = data.pico;
            currentBlocks = data.blocks;
            renderBlocks();
        }

        function deleteFromArchive(i) {
            let archive = JSON.parse(localStorage.getItem('yoga_archive'));
            archive.splice(i, 1);
            localStorage.setItem('yoga_archive', JSON.stringify(archive));
            renderArchive();
        }

        // Inizializzazione
        renderBlocks();
        renderArchive();
    </script>
</body>
</html>
