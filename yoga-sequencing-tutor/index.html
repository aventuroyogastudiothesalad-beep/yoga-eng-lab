<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Builder - Eleva Tu Enseñanza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } }
        /* Stile per i Tooltip */
        .tooltip-trigger:hover .tooltip-content { display: block; }
        .tooltip-content { display: none; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans p-4 md:p-8">

    <header class="max-w-3xl mx-auto text-center mb-8 no-print">
        <h1 class="text-3xl font-light tracking-[0.3em] uppercase italic text-indigo-900">Eleva Tu Yoga</h1>
        <p class="text-[10px] text-stone-500 uppercase tracking-widest mt-2">Metodo Mariateresa Linsalata</p>
        
        <div class="mt-6 flex flex-col items-center gap-2">
            <div class="bg-white px-6 py-2 rounded-full shadow-sm border border-indigo-100">
                <span id="totalTime" class="text-2xl font-mono font-bold text-indigo-600">0</span>
                <span class="text-xs uppercase text-stone-400 font-bold ml-1">min totali</span>
            </div>
            <span class="text-[9px] text-green-600 font-bold tracking-widest">● AUTO-SAVE ACTIVE</span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto">
        
        <section class="bg-indigo-900 text-white p-6 rounded-2xl shadow-xl mb-12 no-print">
            <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-indigo-300 mb-4 italic">Reflexión Inicial</h2>
            <div class="space-y-3">
                <textarea id="spiritual-intent" oninput="saveAll()" class="w-full bg-indigo-800/50 border-none rounded-lg p-3 text-sm placeholder-indigo-400 focus:ring-1 focus:ring-indigo-300 h-16" placeholder="¿Qué conceptos o espiritualidad quieres compartir hoy?"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <input id="focus-fisico" oninput="saveAll()" type="text" placeholder="Enfoque Físico" class="bg-indigo-800/50 border-none rounded-lg p-2 text-xs placeholder-indigo-400">
                    <input id="postura-pico-name" oninput="saveAll()" type="text" placeholder="Postura Pico (Ej: Bakasana)" class="bg-indigo-800/50 border-none rounded-lg p-2 text-xs placeholder-indigo-400 font-bold">
                </div>
            </div>
        </section>

        <div id="builder" class="space-y-4"></div>

    </main>

    <footer class="mt-12 text-center no-print pb-20">
        <button onclick="window.print()" class="bg-indigo-600 text-white px-10 py-4 rounded-full hover:bg-indigo-700 transition shadow-lg font-bold">
            Imprimir Guía de Clase
        </button>
    </footer>

    <script>
        const blocks = [
            { id: "01", title: "Introducción", min: 4, tip: "Momento para hacer sentir seguros a los alumnos. Preguntar lesiones y presentar el tema brevemente.", placeholder: "Bienvenida, lesiones, tema..." },
            { id: "02", title: "Pranayama", min: 4, tip: "Guía a respirar por la nariz de manera consciente, pausada e intencional.", placeholder: "Ujjayi, respiración dirigida..." },
            { id: "03", title: "Warm up", min: 5, tip: "Movimientos dinámicos (Gato-vaca, círculos hombros/cadera). Activa sistema cardiovascular y lubrica articulaciones.", placeholder: "Gato-vaca, círculos, core work suave..." },
            { id: "04", title: "Surya A", min: 10, tip: "2-3 rondas. Primera detallada, las siguientes fluidas. Puedes agregar chaturanga push-ups o tablas.", placeholder: "Rondas de Saludos al Sol A..." },
            { id: "05", title: "Surya B", min: 10, tip: "Prepara el cuerpo para el pico. Guerrero 1, High Lunge o Anjaneyasana. Agrega fuerza si es necesario.", placeholder: "Variaciones de Silla, Warrior I..." },
            { id: "06", title: "Stanfing Pose and balance", min: 12, tip: "¡Cenit de la clase! Progresión coherente. Para principiantes: secuencias de máximo 3 posturas seguidas.", placeholder: "POSTURA PICO + Equilibrio sobre un pie..." },
            { id: "07", title: "Apertura de Cadera", min: 6, tip: "Cuerpo caliente para evitar lesiones. Mínimo una postura (Lagarto, Paloma, Baddha Konasana).", placeholder: "Eka Pada Kapotasana, Malasana..." },
            { id: "08", title: "Arcos", min: 6, tip: "Abre pecho y caderas. Nunca en frío. Colonna lubricada y core activo para proteger lumbares.", placeholder: "Ustrasana, Setu Bandhasana, Dhanurasana..." },
            { id: "09", title: "Cool Down", min: 5, tip: "Torsioni, flexiones adelante, Navasana. Restablece el equilibrio corporal después del pico.", placeholder: "Torsioni, Janu Sirsasana..." },
            { id: "10", title: "Savasana", min: 7, tip: "Mínimo 5-7 minutos. Integración física y espiritual. La salida es tan importante como la entrada.", placeholder: "Silencio, mantra final..." }
        ];

        function saveAll() {
            const sequenceData = [];
            document.querySelectorAll('.block-item').forEach((block, i) => {
                sequenceData.push({
                    min: block.querySelector('.min-input').value,
                    text: block.querySelector('.main-text').value,
                    counter: block.querySelector('.counter-input').value
                });
            });
            const globalData = {
                intent: document.getElementById('spiritual-intent').value,
                focus: document.getElementById('focus-fisico').value,
                pico: document.getElementById('postura-pico-name').value,
                blocks: sequenceData
            };
            localStorage.setItem('yoga_eleva_data', JSON.stringify(globalData));
            updateTotal();
        }

        function loadAll() {
            const saved = JSON.parse(localStorage.getItem('yoga_eleva_data'));
            if (!saved) return;
            document.getElementById('spiritual-intent').value = saved.intent || "";
            document.getElementById('focus-fisico').value = saved.focus || "";
            document.getElementById('postura-pico-name').value = saved.pico || "";
            
            document.querySelectorAll('.block-item').forEach((block, i) => {
                if (saved.blocks[i]) {
                    block.querySelector('.min-input').value = saved.blocks[i].min;
                    block.querySelector('.main-text').value = saved.blocks[i].text;
                    block.querySelector('.counter-input').value = saved.blocks[i].counter;
                    if(saved.blocks[i].counter.trim() !== "") block.querySelector('.counter-box').classList.remove('no-print');
                }
            });
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.min-input').forEach(i => total += parseInt(i.value || 0));
            document.getElementById('totalTime').innerText = total;
        }

        blocks.forEach((b) => {
            const div = document.createElement('div');
            div.className = "block-item bg-white p-5 rounded-xl shadow-sm border border-stone-200 relative group transition hover:border-indigo-300";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <div class="relative tooltip-trigger flex items-center gap-2 cursor-help">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-indigo-500">${b.id}. ${b.title}</h3>
                        <span class="text-indigo-300 text-xs no-print">ⓘ</span>
                        <div class="tooltip-content absolute left-0 top-6 w-64 bg-stone-800 text-white text-[11px] p-3 rounded-lg shadow-xl z-20 leading-relaxed font-light">
                            ${b.tip}
                        </div>
                    </div>
                    <div class="flex items-center gap-1 no-print">
                        <input type="number" value="${b.min}" class="min-input w-8 text-right font-bold text-indigo-600 focus:outline-none" oninput="saveAll()">
                        <span class="text-[9px] text-stone-400 font-bold uppercase">min</span>
                    </div>
                </div>
                <textarea oninput="saveAll()" class="main-text w-full h-20 text-sm p-2 bg-stone-50 rounded border-none focus:ring-1 focus:ring-indigo-100 resize-none mb-1" placeholder="${b.placeholder}"></textarea>
                <div class="counter-box no-print">
                    <textarea oninput="handleCounter(this)" class="counter-input w-full h-8 text-[11px] p-2 bg-orange-50/20 border-dashed border border-orange-100 rounded italic placeholder-orange-300 focus:ring-0" placeholder="Contropostura (opzionale)..."></textarea>
                </div>
            `;
            document.getElementById('builder').appendChild(div);
        });

        function handleCounter(el) {
            if(el.value.trim() === "") el.parentElement.classList.add('no-print');
            else el.parentElement.classList.remove('no-print');
            saveAll();
        }

        loadAll();
    </script>
</body>
</html>
