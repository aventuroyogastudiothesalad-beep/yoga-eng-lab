<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Sequence Builder</title>
    <link rel="icon" type="image/png" href="logo_grande.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; font-size: 10pt; color: black; }
            #print-header { display: flex !important; align-items: center; border-bottom: 2pt solid #000; padding-bottom: 20px; margin-bottom: 30px; }
            .block-item { page-break-inside: avoid; border-bottom: 1pt solid #eee !important; padding: 15px 0 !important; }
        }
        .print-only { display: none; }
        .drag-handle { cursor: grab; }
        .step-number { background: #1e1b4b; color: white; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 11px; font-weight: bold; flex-shrink: 0; }
        #progress-bar { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .check-pill { cursor: pointer; transition: all 0.2s; border: 1px solid #e5e7eb; font-size: 9px; padding: 2px 8px; border-radius: 12px; background: white; }
        .check-pill.active { background: #1e1b4b; color: white; border-color: #1e1b4b; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans p-4 md:p-8">

    <div id="print-header" class="print-only">
        <img src="logo_grande.png" style="width: 50px; height: 50px; margin-right: 20px; border-radius: 8px;">
        <div>
            <h1 style="font-size: 20pt; text-transform: uppercase; font-family: serif; margin: 0;">Yoga Sequence Builder</h1>
            <p style="font-size: 9pt; color: #666;">Elena y Mariateresa • Lab Edition 2026</p>
        </div>
    </div>

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 no-print gap-6 border-b border-stone-200 pb-8">
        <div class="flex items-center gap-6">
            <div class="w-24 h-24 bg-indigo-950 rounded-2xl flex items-center justify-center text-white text-3xl font-black shadow-xl overflow-hidden">
                <img src="logo_grande.png" alt="YB" onerror="this.parentElement.innerHTML='YB'">
            </div>
            <div>
                <h1 class="text-3xl font-light tracking-tighter uppercase text-indigo-950">Yoga Sequence <span class="font-black italic">Builder</span></h1>
                <p class="text-[10px] text-stone-400 uppercase tracking-[0.5em] font-bold mt-1">Elena y Mariateresa</p>
            </div>
        </div>
        <div class="w-full md:w-72 bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
            <div class="flex justify-between mb-2 text-[10px] font-black uppercase text-stone-400 tracking-widest">
                <span>Tiempo</span>
                <span class="text-indigo-600"><span id="totalTime">0</span> / 60 MIN</span>
            </div>
            <div class="h-2 bg-stone-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-stone-300 w-0"></div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <div class="lg:col-span-1 space-y-6 no-print">
            <section class="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100 shadow-sm">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-indigo-900 mb-6 border-b border-indigo-100 pb-2">Metodología Lab</h2>
                <div class="space-y-5">
                    <div>
                        <div class="flex items-center gap-2 mb-2"><span class="step-number">1</span> <span class="text-[9px] font-black uppercase tracking-tight text-indigo-900">Objetivo Principal</span></div>
                        <select id="method-type" class="w-full p-2 mb-2 bg-white border rounded-lg text-[10px] outline-none">
                            <option value="peak">Postura Pico (Peak Pose)</option>
                            <option value="family">Familia de Posturas</option>
                        </select>
                        <input id="target-name" type="text" placeholder="Nombre (Ej: Bakasana)" class="w-full p-2 bg-white border rounded-lg text-[10px] font-bold outline-none">
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-2"><span class="step-number">2</span> <span class="text-[9px] font-black uppercase tracking-tight text-indigo-900">Apertura</span></div>
                        <div class="flex flex-wrap gap-1 mb-2">
                            <span class="check-pill" onclick="this.classList.toggle('active')">Isquios</span>
                            <span class="check-pill" onclick="this.classList.toggle('active')">Hombros</span>
                            <span class="check-pill" onclick="this.classList.toggle('active')">Caderas</span>
                            <span class="check-pill" onclick="this.classList.toggle('active')">Psoas</span>
                        </div>
                        <textarea class="w-full p-2 text-[10px] bg-white border rounded-lg h-10 resize-none outline-none" placeholder="¿Qué estirar?"></textarea>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-2"><span class="step-number">3</span> <span class="text-[9px] font-black uppercase tracking-tight text-indigo-900">Estabilidad</span></div>
                        <div class="flex flex-wrap gap-1 mb-2">
                            <span class="check-pill" onclick="this.classList.toggle('active')">Core</span>
                            <span class="check-pill" onclick="this.classList.toggle('active')">Glúteos</span>
                            <span class="check-pill" onclick="this.classList.toggle('active')">Escápulas</span>
                        </div>
                        <textarea class="w-full p-2 text-[10px] bg-white border rounded-lg h-10 resize-none outline-none" placeholder="¿Qué activar?"></textarea>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-2"><span class="step-number">4</span> <span class="text-[9px] font-black uppercase tracking-tight text-indigo-900">Patrones Movimiento</span></div>
                        <textarea class="w-full p-2 text-[10px] bg-white border rounded-lg h-12 resize-none outline-none" placeholder="Posturas que imitan el pico"></textarea>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-2"><span class="step-number">5</span> <span class="text-[9px] font-black uppercase tracking-tight text-indigo-900">Compensación final</span></div>
                        <textarea id="ana-counter" class="w-full p-2 text-[10px] bg-white border rounded-lg h-10 resize-none outline-none" placeholder="Relajar tensiones..."></textarea>
                    </div>
                </div>
            </section>
            <section class="bg-white p-5 rounded-2xl border border-stone-200">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-3">Música</h2>
                <input id="playlist-link" type="text" oninput="updatePlayer()" placeholder="Link YouTube o Spotify" class="w-full text-xs p-2 bg-stone-50 border rounded-lg outline-none mb-3">
                <div id="video-container" class="rounded-lg overflow-hidden hidden shadow-inner border"></div>
            </section>
        </div>

        <div class="lg:col-span-3 space-y-4">
            <div id="builder" class="space-y-3"></div>
            <div class="flex flex-col md:flex-row gap-4 no-print pt-6 pb-20">
                <button onclick="addNewBlock()" class="flex-1 py-4 border-2 border-dashed border-stone-300 rounded-2xl text-stone-400 text-[10px] font-black uppercase tracking-widest hover:bg-white transition">+ Nueva Fase</button>
                <button onclick="window.print()" class="flex-1 bg-indigo-950 text-white py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-xl hover:bg-black transition">Generar PDF</button>
            </div>
        </div>
    </main>

    <script>
        let currentBlocks = [
            { title: "Introduction", min: 5, text: "" },
            { title: "Pranayama", min: 5, text: "" },
            { title: "Warm up", min: 8, text: "" },
            { title: "Surya Namaskar", min: 10, text: "" },
            { title: "Peak Pose Analysis", min: 12, counter: "", showCounter: true },
            { title: "Cool Down", min: 10, counter: "", showCounter: true, text: "- Apanasana\n- Ananda Balasana\n- Jathara Parivartanasana" },
            { title: "Savasana", min: 10, text: "" }
        ];

        function renderBlocks() {
            const container = document.getElementById('builder');
            container.innerHTML = '';
            currentBlocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl border border-stone-200 shadow-sm relative block-item";
                div.dataset.index = i;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <span class="no-print drag-handle text-stone-300 cursor-grab hover:text-indigo-400">⋮⋮</span>
                            <div class="flex flex-col">
                                <span class="text-[9px] font-black text-indigo-300 uppercase tracking-tighter">#${(i+1).toString().padStart(2,'0')} Phase</span>
                                <input type="text" value="${b.title}" oninput="updateBlockData(${i}, 'title', this.value)" class="font-black uppercase text-xs tracking-widest text-indigo-950 border-none p-0 outline-none w-64 bg-transparent">
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="number" value="${b.min}" oninput="updateBlockData(${i}, 'min', this.value)" class="w-8 text-[10px] font-bold text-indigo-600 bg-stone-50 rounded p-1 outline-none no-print text-right">
                            <span class="text-[10px] font-black text-stone-900 uppercase">${b.min} min</span>
                        </div>
                    </div>
                    <textarea oninput="autoResize(this); updateBlockData(${i}, 'text', this.value)" class="w-full text-sm p-0 border-none resize-none outline-none text-stone-600 leading-relaxed font-mono placeholder-stone-200" placeholder="- Escribe las asanas...">${b.text || ''}</textarea>
                    ${b.showCounter ? `
                        <div class="mt-4 p-4 bg-orange-50 rounded-2xl border border-orange-100 relative group">
                            <label class="text-[8px] font-black text-orange-400 uppercase tracking-widest block mb-1">Compensación / Contrapostura</label>
                            <input type="text" value="${b.counter || ''}" oninput="updateBlockData(${i}, 'counter', this.value)" class="w-full bg-transparent text-xs italic text-stone-600 border-none outline-none" placeholder="¿Qué postura relaja la tensión?">
                            <button onclick="removeCounter(${i})" class="no-print absolute right-3 top-3 text-orange-200 hover:text-orange-500 font-bold text-xs opacity-0 group-hover:opacity-100 transition">×</button>
                        </div>
                    ` : `
                        <button onclick="addCounter(${i})" class="no-print mt-3 text-[9px] font-bold text-stone-300 uppercase hover:text-orange-400 transition-colors">+ Añadir Compensación</button>
                    `}
                    <button onclick="removeBlock(${i})" class="no-print absolute -right-2 -top-2 w-7 h-7 bg-white border border-stone-100 rounded-full text-xs text-stone-300 hover:text-red-500 shadow-md flex items-center justify-center font-bold">×</button>
                `;
                container.appendChild(div);
                autoResize(div.querySelector('textarea'));
            });
            updateTotal();
        }

        function updateBlockData(index, field, value) {
            currentBlocks[index][field] = (field === 'min') ? (parseInt(value) || 0) : value;
            if(field === 'min') updateTotal();
        }

        function addCounter(i) { currentBlocks[i].showCounter = true; renderBlocks(); }
        function removeCounter(i) { currentBlocks[i].showCounter = false; currentBlocks[i].counter = ""; renderBlocks(); }
        function removeBlock(i) { currentBlocks.splice(i, 1); renderBlocks(); }
        function addNewBlock() { currentBlocks.push({ title: "Custom Phase", min: 5, text: "", showCounter: false }); renderBlocks(); }

        function updatePlayer() {
            const link = document.getElementById('playlist-link').value;
            const container = document.getElementById('video-container');
            if (link.includes('youtube.com') || link.includes('youtu.be')) {
                let id = link.split('v=')[1] || link.split('/').pop();
                if(id.includes('&')) id = id.split('&')[0];
                container.innerHTML = `<iframe width="100%" height="150" src="https://www.youtube.com/embed/${id}" frameborder="0"></iframe>`;
                container.classList.remove('hidden');
            } else { container.classList.add('hidden'); }
        }

        function updateTotal() {
            const total = currentBlocks.reduce((acc, curr) => acc + (parseInt(curr.min) || 0), 0);
            document.getElementById('totalTime').innerText = total;
            const bar = document.getElementById('progress-bar');
            let percentage = (total / 60) * 100;
            bar.style.width = Math.min(percentage, 100) + '%';
            bar.style.backgroundColor = total >= 60 ? "#22c55e" : "#818cf8";
        }

        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

        // CONFIGURACIÓN SORTABLE CON SINCRONIZACIÓN DE DATOS
        new Sortable(document.getElementById('builder'), { 
            handle: '.drag-handle', 
            animation: 200,
            onEnd: function (evt) {
                const itemEl = evt.item;
                // Movemos el elemento en el array de datos
                const element = currentBlocks.splice(evt.oldIndex, 1)[0];
                currentBlocks.splice(evt.newIndex, 0, element);
                // Re-renderizamos para que los números #01, #02 se actualicen correctamente
                renderBlocks();
            }
        });

        renderBlocks();
    </script>
</body>
</html>
