<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Sequencing Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        /* ESTILO PARA PDF (LIMPIO Y ELEGANTE) */
        @media print {
            @page { margin: 2cm; }
            body { background: white !important; font-size: 11pt; color: black; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            /* Eliminamos los contenedores de la app para el PDF */
            main { display: block !important; width: 100%; max-width: 100% !important; margin: 0 !important; }
            section { border: none !important; box-shadow: none !important; padding: 0 !important; color: black !important; margin-bottom: 20px !important; }
            
            #print-header { display: flex !important; border-bottom: 1pt solid #000; padding-bottom: 10px; margin-bottom: 30px; }
            
            /* Fases como lista simple */
            .block-item { 
                page-break-inside: avoid; 
                background: transparent !important;
                border: none !important; 
                border-bottom: 0.5pt solid #eee !important; 
                padding: 12px 0 !important; 
                box-shadow: none !important;
                border-radius: 0 !important;
            }
            .block-item textarea { 
                border: none !important; 
                height: auto !important; 
                font-family: serif; 
                font-size: 11pt; 
                color: #333 !important;
            }
            /* Compensación simple sin el recuadro naranja en el PDF */
            .counter-box-app { 
                border: none !important; 
                background: transparent !important; 
                padding: 0 !important; 
                margin-top: 4px !important;
            }
            .counter-box-app input { 
                font-style: italic; 
                color: #555 !important; 
                font-size: 10pt;
                border-left: 2pt solid #ccc !important;
                padding-left: 10px !important;
            }
        }

        /* ESTILO APP (NO PRINT) */
        .print-only { display: none; }
        .drag-handle { cursor: grab; }
        #progress-bar { transition: width 0.6s ease, background-color 0.6s ease; }
        .counter-box-app { background-color: rgba(249, 115, 22, 0.05); border: 1px dashed #fdba74; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans p-4 md:p-8">

    <div id="print-header" class="print-only">
        <div style="flex: 1;">
            <h1 style="font-size: 22pt; text-transform: uppercase; letter-spacing: 4px; color: #000; font-family: serif;">Yoga Sequencing Builder</h1>
            <p style="font-size: 10pt; text-transform: uppercase; letter-spacing: 2px; color: #444;">Elena y Mariateresa</p>
        </div>
        <div style="text-align: right;"><p id="print-date" style="font-size: 10pt; color: #666;"></p></div>
    </div>

    <header class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 no-print gap-6 border-b border-stone-200 pb-6">
        <div class="text-center md:text-left">
            <h1 class="text-2xl font-light tracking-[0.2em] uppercase italic text-indigo-900 leading-tight">Yoga Sequencing Builder</h1>
            <p class="text-[10px] text-stone-500 uppercase tracking-[0.3em] mt-1 font-bold">Elena y Mariateresa</p>
        </div>
        
        <div class="flex flex-col items-center w-full md:w-72 bg-white p-4 rounded-2xl shadow-sm border border-stone-200">
            <div class="flex justify-between w-full mb-2">
                <span class="text-[9px] font-black uppercase text-stone-400 tracking-tighter">Progreso de la sesión</span>
                <span id="timer-display" class="text-[10px] font-black text-indigo-600"><span id="totalTime">0</span> / 60 MIN</span>
            </div>
            <div class="w-full bg-stone-100 rounded-full h-3 overflow-hidden border border-stone-200">
                <div id="progress-bar" class="bg-indigo-100 h-full w-0"></div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <aside class="lg:col-span-1 space-y-6 no-print">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-4">Archivo</h2>
                <div class="space-y-3">
                    <input id="save-name" type="text" placeholder="Nombre de la clase..." class="w-full text-sm p-3 bg-stone-50 border-none rounded-xl outline-none focus:ring-1 focus:ring-indigo-300">
                    <button onclick="saveToArchive()" class="w-full bg-indigo-600 text-white text-[10px] py-3 rounded-xl font-bold tracking-widest shadow-lg hover:bg-indigo-700">GUARDAR CLASE</button>
                    <button onclick="resetApp()" class="w-full text-stone-400 text-[9px] py-1 font-bold hover:text-stone-600 uppercase">Nueva sesión</button>
                </div>
                <div class="mt-6 border-t pt-4">
                    <ul id="archive-list" class="space-y-2 max-h-40 overflow-y-auto text-[11px]"></ul>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl border border-stone-200">
                <h2 class="text-[10px] font-bold uppercase text-stone-400 mb-3 tracking-widest">Música / Playlist</h2>
                <input id="playlist-link" type="text" oninput="updatePlayer()" placeholder="Link YouTube o Spotify" class="w-full text-xs p-3 bg-stone-50 border rounded-xl outline-none mb-3">
                <div id="video-container" class="rounded-lg overflow-hidden hidden shadow-inner"></div>
            </section>
        </aside>

        <div class="lg:col-span-2 space-y-6">
            <section class="bg-indigo-900 text-white p-7 rounded-3xl shadow-2xl print:bg-transparent print:text-black print:p-0 print:shadow-none">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="text-[9px] uppercase text-indigo-300 font-bold block mb-1">Enfoque Espiritual</label>
                        <input id="focus-espiritual" type="text" class="w-full bg-indigo-800/40 border-none rounded-xl p-3 text-sm outline-none print:border-b">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase text-indigo-300 font-bold block mb-1">Enfoque Físico</label>
                        <input id="focus-fisico" type="text" class="w-full bg-indigo-800/40 border-none rounded-xl p-3 text-sm outline-none print:border-b">
                    </div>
                </div>
                <label class="text-[9px] uppercase text-indigo-300 font-bold block mb-1">Reflexión / Intención</label>
                <textarea id="spiritual-intent" class="w-full bg-indigo-800/40 border-none rounded-xl p-3 text-sm h-16 resize-none outline-none mb-4 print:border-b"></textarea>
                <label class="text-[9px] uppercase text-indigo-300 font-bold block mb-1">Postura Pico (Peak Pose)</label>
                <input id="postura-pico-name" type="text" class="w-full bg-white/10 border-none rounded-xl p-3 text-sm font-bold text-indigo-100 outline-none print:text-black print:border-b">
            </section>

            <div id="builder" class="space-y-4"></div>

            <div class="mt-8 space-y-4 no-print pb-10">
                <button onclick="addNewBlock()" class="w-full py-4 border-2 border-dashed border-stone-300 rounded-2xl text-stone-400 text-[10px] font-bold hover:bg-white transition uppercase tracking-widest">+ AÑADIR FASE</button>
                <button onclick="preparePrint()" class="w-full bg-stone-900 text-white py-5 rounded-2xl font-bold shadow-xl uppercase tracking-[0.3em] text-xs">Descargar PDF / Imprimir</button>
            </div>
        </div>
    </main>

    <div class="print-only" style="margin-top: 50px; border-top: 1pt solid #eee; padding-top: 20px;">
        <div style="display: flex; justify-between; font-size: 9pt; color: #777; font-style: italic;">
            <p>Yoga Sequencing Builder - Elena y Mariateresa</p>
            <p style="margin-left: auto;">Firma del Profesor: _________________________</p>
        </div>
    </div>

    <script>
        // Fases en INGLÉS
        let currentBlocks = [
            { title: "Introduction", min: 4 },
            { title: "Pranayama", min: 4 },
            { title: "Warm up", min: 5 },
            { title: "Surya Namaskar A", min: 10 },
            { title: "Surya Namaskar B", min: 10 },
            { title: "Peak Pose & Balance", min: 12 },
            { title: "Hip Opening", min: 6 },
            { title: "Backbends", min: 6 },
            { title: "Cool Down", min: 5 },
            { title: "Savasana", min: 7 }
        ];

        function renderBlocks() {
            const container = document.getElementById('builder');
            container.innerHTML = '';
            currentBlocks.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = "block-item bg-white p-6 rounded-2xl border border-stone-200 relative shadow-sm";
                div.innerHTML = `
                    <div class="no-print drag-handle absolute -left-2 top-1/2 -translate-y-1/2 text-stone-300 px-2 cursor-grab">⋮⋮</div>
                    <button onclick="removeBlock(${i})" class="no-print absolute -right-2 -top-2 bg-white text-stone-400 border rounded-full w-6 h-6 text-xs flex items-center justify-center hover:text-red-500 shadow-sm">×</button>
                    
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black text-indigo-300 print:text-black">#${(i+1).toString().padStart(2,'0')}</span>
                            <input type="text" value="${b.title}" oninput="currentBlocks[${i}].title=this.value" class="text-xs font-black uppercase tracking-widest text-indigo-900 border-none p-0 outline-none print:text-black print:text-[11pt]">
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="number" value="${b.min}" oninput="updateTime(${i}, this.value)" class="no-print w-8 text-right text-xs font-bold text-indigo-600 outline-none">
                            <span class="text-[9px] font-bold text-stone-400 uppercase print:text-black">${b.min} min</span>
                        </div>
                    </div>
                    
                    <textarea oninput="autoResize(this); updateText(${i}, this.value)" class="w-full text-sm p-0 bg-transparent border-none resize-none outline-none text-stone-600 leading-relaxed mb-2" placeholder="Detalles...">${b.text || ''}</textarea>
                    
                    <div class="counter-box-app p-3 rounded-xl">
                        <input type="text" value="${b.counter || ''}" oninput="updateCounter(${i}, this.value)" class="w-full bg-transparent text-[11px] italic text-stone-500 border-none p-0 outline-none" placeholder="Compensación...">
                    </div>
                `;
                container.appendChild(div);
                autoResize(div.querySelector('textarea'));
            });
            updateTotal();
        }

        function updatePlayer() {
            const link = document.getElementById('playlist-link').value;
            const container = document.getElementById('video-container');
            if (link.includes('youtube.com') || link.includes('youtu.be')) {
                let id = link.split('v=')[1] || link.split('/').pop();
                if(id.includes('&')) id = id.split('&')[0];
                container.innerHTML = `<iframe width="100%" height="150" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
                container.classList.remove('hidden');
            } else { container.classList.add('hidden'); }
        }

        function updateTotal() {
            const total = currentBlocks.reduce((acc, curr) => acc + (parseInt(curr.min) || 0), 0);
            document.getElementById('totalTime').innerText = total;
            const bar = document.getElementById('progress-bar');
            let percentage = (total / 60) * 100;
            bar.style.width = Math.min(percentage, 100) + '%';
            
            // Tonalidades suaves que llegan al VERDE
            if (total < 20) bar.style.backgroundColor = "#f5f5f4"; // Piedra claro
            else if (total < 40) bar.style.backgroundColor = "#e0e7ff"; // Indigo claro
            else if (total < 60) bar.style.backgroundColor = "#818cf8"; // Indigo medio
            else bar.style.backgroundColor = "#22c55e"; // VERDE (Meta)
        }

        function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }
        new Sortable(document.getElementById('builder'), { animation: 150, handle: '.drag-handle', onEnd: (evt) => {
            const item = currentBlocks.splice(evt.oldIndex, 1)[0];
            currentBlocks.splice(evt.newIndex, 0, item);
            renderBlocks();
        }});

        function updateTime(i, val) { currentBlocks[i].min = parseInt(val) || 0; updateTotal(); }
        function updateText(i, val) { currentBlocks[i].text = val; }
        function updateCounter(i, val) { currentBlocks[i].counter = val; }
        function addNewBlock() { currentBlocks.push({ title: "New Phase", min: 5, text: "" }); renderBlocks(); }
        function removeBlock(i) { currentBlocks.splice(i, 1); renderBlocks(); }
        function preparePrint() { 
            document.getElementById('print-date').innerText = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
            window.print(); 
        }
        function saveToArchive() {
            const name = document.getElementById('save-name').value || "Clase sin nombre";
            const data = { name, esp: document.getElementById('focus-espiritual').value, fis: document.getElementById('focus-fisico').value, int: document.getElementById('spiritual-intent').value, pico: document.getElementById('postura-pico-name').value, blocks: currentBlocks, play: document.getElementById('playlist-link').value };
            let archive = JSON.parse(localStorage.getItem('yoga_v7') || '[]');
            archive.push(data);
            localStorage.setItem('yoga_v7', JSON.stringify(archive));
            renderArchive();
        }
        function renderArchive() {
            const list = document.getElementById('archive-list');
            const archive = JSON.parse(localStorage.getItem('yoga_v7') || '[]');
            list.innerHTML = archive.map((item, i) => `<li class="flex justify-between p-2 border-b"><button onclick="loadFromArchive(${i})" class="truncate w-full text-left font-medium hover:text-indigo-600">${item.name}</button></li>`).join('');
        }
        function loadFromArchive(i) {
            const data = JSON.parse(localStorage.getItem('yoga_v7'))[i];
            document.getElementById('focus-espiritual').value = data.esp;
            document.getElementById('focus-fisico').value = data.fis;
            document.getElementById('spiritual-intent').value = data.int;
            document.getElementById('postura-pico-name').value = data.pico;
            document.getElementById('playlist-link').value = data.play || '';
            currentBlocks = data.blocks;
            renderBlocks();
            updatePlayer();
        }
        function resetApp() { if(confirm("¿Nueva clase?")) location.reload(); }

        renderBlocks();
        renderArchive();
    </script>
</body>
</html>
